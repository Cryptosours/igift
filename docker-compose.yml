services:
  db:
    image: postgres:16-alpine
    container_name: realdeal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: realdeal
      POSTGRES_PASSWORD: realdeal
      POSTGRES_DB: realdeal
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realdeal"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realdeal-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://realdeal:realdeal@db:5432/realdeal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
