<svg viewBox="0 0 1200 630" width="1200" height="630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient orbs -->
  <circle cx="900" cy="200" r="300" fill="#4f46e5" opacity="0.15" filter="blur(80px)"/>
  <circle cx="300" cy="500" r="250" fill="#10b981" opacity="0.1" filter="blur(80px)"/>

  <!-- Logo mark (scaled) -->
  <g transform="translate(100, 240) scale(3)">
    <rect width="48" height="48" rx="12" fill="#4f46e5"/>
    <rect x="7" y="14" width="18" height="11" rx="2" fill="white" opacity="0.9"/>
    <rect x="6" y="11" width="20" height="4" rx="1.5" fill="white"/>
    <rect x="14.75" y="11" width="2.5" height="14" fill="#4f46e5" opacity="0.25"/>
    <rect x="6" y="12" width="20" height="2" fill="#4f46e5" opacity="0.15"/>
    <path d="M16 11C16 11 13 7.5 10.5 8.5C8.5 9.3 9 11 10.5 11H16Z" fill="white"/>
    <path d="M16 11C16 11 19 7.5 21.5 8.5C23.5 9.3 23 11 21.5 11H16Z" fill="white"/>
    <circle cx="16" cy="10.5" r="1.25" fill="white" opacity="0.6"/>
  </g>

  <!-- Text: iGift -->
  <text x="260" y="310" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">
    i<tspan fill="#818cf8">Gift</tspan>
  </text>

  <!-- Tagline -->
  <text x="105" y="370" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">
    Trust-scored deal intelligence
  </text>

  <!-- Accent line -->
  <rect x="105" y="400" width="120" height="3" rx="1.5" fill="#4f46e5"/>

  <!-- Stats row -->
  <g transform="translate(105, 440)">
    <text font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#10b981">180+</text>
    <text x="0" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" text-transform="uppercase" letter-spacing="1">OFFERS</text>

    <text x="140" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#818cf8">15</text>
    <text x="140" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">SOURCES</text>

    <text x="280" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#f59e0b">2-Score</text>
    <text x="280" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">TRUST SYSTEM</text>
  </g>

  <!-- Right side: sample deal card mockup -->
  <g transform="translate(650, 140)">
    <rect width="440" height="350" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

    <!-- Card header -->
    <text x="28" y="40" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b" letter-spacing="1">LIVE MARKET OVERVIEW</text>
    <circle cx="400" cy="34" r="4" fill="#10b981" opacity="0.8"/>

    <!-- Deal rows -->
    <g transform="translate(28, 70)">
      <rect width="384" height="56" rx="8" fill="#1e293b"/>
      <text x="16" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white">Steam $50 Gift Card</text>
      <text x="16" y="40" font-family="Inter, sans-serif" font-size="11" fill="#64748b">via Bitrefill</text>
      <text x="320" y="22" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#10b981">$46.20</text>
      <text x="340" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#10b981">-8%</text>
    </g>

    <g transform="translate(28, 140)">
      <rect width="384" height="56" rx="8" fill="#1e293b"/>
      <text x="16" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white">Apple $100 Gift Card</text>
      <text x="16" y="40" font-family="Inter, sans-serif" font-size="11" fill="#64748b">via dundle</text>
      <text x="320" y="22" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#10b981">$88.50</text>
      <text x="330" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#10b981">-12%</text>
    </g>

    <g transform="translate(28, 210)">
      <rect width="384" height="56" rx="8" fill="#1e293b"/>
      <text x="16" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white">Netflix $25 Gift Card</text>
      <text x="16" y="40" font-family="Inter, sans-serif" font-size="11" fill="#64748b">via Raise</text>
      <text x="320" y="22" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#10b981">$21.50</text>
      <text x="330" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#10b981">-14%</text>
    </g>

    <!-- Bottom stat bar -->
    <rect x="28" y="286" width="384" height="40" rx="8" fill="#1e293b"/>
    <text x="44" y="312" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Avg. Discount</text>
    <text x="180" y="312" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#f59e0b">-12%</text>
    <text x="260" y="312" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Trust</text>
    <rect x="300" y="302" width="8" height="8" rx="4" fill="#22c55e"/>
    <text x="316" y="312" font-family="Inter, sans-serif" font-size="11" fill="#22c55e">Verified</text>
  </g>

  <!-- Domain -->
  <text x="105" y="570" font-family="JetBrains Mono, monospace" font-size="16" fill="#475569" letter-spacing="1">igift.app</text>
</svg>
